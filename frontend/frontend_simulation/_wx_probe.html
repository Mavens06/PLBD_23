<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  body{margin:0;background:#eef3ec;font-family:'DM Sans',sans-serif;padding:18px;max-width:420px}
  .zone-detail-panel{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  h3{margin:4px 0 12px}
  .practice-card{background:#f6faf5;border-radius:12px;padding:10px;margin-bottom:8px}
  .practice-card.water{border-left:4px solid #2f80ed}.practice-card.amend{border-left:4px solid #c0392b}
  .practice-card.watch{border-left:4px solid #e6a817}.practice-card.good{border-left:4px solid #4a9c55}
  .practice-title{font-weight:700;font-size:13px}.practice-detail{font-size:12px;color:#555;margin-top:2px}
  .diag-head{display:flex;gap:10px;align-items:center;margin-bottom:10px}
  .diag-ring{width:54px;height:54px;border-radius:50%;display:grid;place-items:center}.diag-ring-inner{width:42px;height:42px;border-radius:50%;background:#fff;display:grid;place-items:center}.diag-ring-pct{font-weight:800;font-size:12px}
  .diag-head-crop{font-weight:800}.diag-head-sub{font-size:11px;color:#888}
  .diag-pill-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}.diag-pill{background:#f3f6f2;border-radius:10px;padding:6px 8px;font-size:11px;min-width:60px}.diag-pill.off{background:#fbeedd}
  .better-suited-title{font-weight:700;font-size:12px;margin:8px 0 4px}.better-chip{font-size:11px;background:#eef3ee;border-radius:20px;padding:3px 8px;margin-right:4px}
</style></head>
<body>
<div class="zone-detail-panel">
  <h3>Zone B2 · Tomate (sol sec, pluie prévue)</h3>
  <div id="selectedZoneMeasures"></div>
  <div id="selectedZonePractices"></div>
</div>
<script>window.currentLang='fr';</script>
<script src="js/data_model.js"></script>
<script src="js/i18n.js"></script>
<script src="js/state.js"></script>
<script>function showToast(){};function applyLanguage(){};</script>
<script src="js/app.js"></script>
<script>
  APP_STATE.weather={available:true,rain3d:12,tmax:29};
  APP_STATE.selectedZone='B2';
  APP_STATE.zoneCropPlan['B2']='Tomate';
  APP_STATE.fieldData['B2']={point:'B2',measured:true,humidity:35,ph:5.6,temp:24,ec:0.9};
  document.title='ready';
</script>
</body></html>
